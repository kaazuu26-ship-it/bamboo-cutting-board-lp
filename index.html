<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹製まな板 - Meta限定クーポン</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1>竹製まな板</h1>
            <p class="tagline">Meta限定クーポン配布中</p>
        </header>

        <!-- 本編画像 1-9 -->
        <div class="manga-section">
            <img src="images/image1.png" alt="漫画1" class="manga-image">
            <img src="images/image2.png" alt="漫画2" class="manga-image">
            <img src="images/image3.png" alt="漫画3" class="manga-image">
            <img src="images/image4.png" alt="漫画4" class="manga-image">
            <img src="images/image5.png" alt="漫画5" class="manga-image">
            <img src="images/image6.png" alt="漫画6" class="manga-image">
            <img src="images/image7.png" alt="漫画7" class="manga-image">
            <img src="images/image8.png" alt="漫画8" class="manga-image">
            <img src="images/image9.png" alt="漫画9" class="manga-image">
        </div>

        <!-- CTA 中間 -->
        <div class="cta-section">
            <img src="images/cta1.png" alt="CTA1" class="cta-image">
            <div class="button-group">
                <button class="btn btn-coupon" id="couponBtnMid">クーポンを獲得する</button>
                <button class="btn btn-product" id="productBtnMid">商品を見る</button>
            </div>
        </div>

        <!-- 本編画像 10-18 -->
        <div class="manga-section">
            <img src="images/image10.png" alt="漫画10" class="manga-image">
            <img src="images/image11.png" alt="漫画11" class="manga-image">
            <img src="images/image12.png" alt="漫画12" class="manga-image">
            <img src="images/image13.png" alt="漫画13" class="manga-image">
            <img src="images/image14.png" alt="漫画14" class="manga-image">
            <img src="images/image15.png" alt="漫画15" class="manga-image">
            <img src="images/image16.png" alt="漫画16" class="manga-image">
            <img src="images/image17.png" alt="漫画17" class="manga-image">
            <img src="images/image18.png" alt="漫画18" class="manga-image">
        </div>

        <!-- CTA 最後 -->
        <div class="cta-section final">
            <img src="images/cta2.png" alt="CTA2" class="cta-image">
            <div class="button-group">
                <button class="btn btn-coupon" id="couponBtnFinal">クーポンを獲得する</button>
                <button class="btn btn-product" id="productBtnFinal">商品を見る</button>
            </div>
        </div>

        <!-- フッター -->
        <footer class="footer">
            <p>© 2026 relief10 楽天市場店</p>
            <p class="footer-link">
                <a href="https://item.rakuten.co.jp/relief10/10000981/" target="_blank">
                    商品の詳細・特商法について
                </a>
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
